openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: content
    description: Site content
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /content:
    get:
      operationId: getContent
      tags: [content]
      summary: Get all site content
      responses:
        "200":
          description: All content sections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentBlock"

  /content/{section}:
    get:
      operationId: getContentSection
      tags: [content]
      summary: Get content for a section
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Content section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentBlock"
        "404":
          description: Section not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminToken"
        "401":
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/content/{section}:
    put:
      operationId: updateContentSection
      tags: [admin]
      summary: Update a content section (admin only)
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentSectionInput"
      responses:
        "200":
          description: Updated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentBlock"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ContentBlock:
      type: object
      required: [id, section, value, updatedAt]
      properties:
        id:
          type: integer
        section:
          type: string
        value:
          type: string
        updatedAt:
          type: string

    AdminLoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AdminToken:
      type: object
      required: [token]
      properties:
        token:
          type: string

    ContentSectionInput:
      type: object
      required: [value]
      properties:
        value:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
